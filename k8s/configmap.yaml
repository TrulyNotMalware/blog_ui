apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-fe-config
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-fe
    app.kubernetes.io/part-of: blog
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  # NEXT_PUBLIC_* vars are baked in at build time via docker build --build-arg.
  # They cannot be injected at runtime. Set them when building the image:
  #   docker build \
  #     --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.yourdomain.com/v1 \
  #     --build-arg NEXT_PUBLIC_SITE_URL=https://yourdomain.com \
  #     -t ghcr.io/TrulyNotMalware/blog-fe:latest blog_ui/
