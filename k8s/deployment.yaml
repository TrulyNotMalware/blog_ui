apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-fe
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-fe
    app.kubernetes.io/part-of: blog
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: blog-fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog-fe
        app.kubernetes.io/part-of: blog
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # ISR / on-demand revalidation (revalidate=60, revalidateTag on admin edits) rewrites
      # prerendered output under .next/server/app AND .next/cache at runtime. With
      # readOnlyRootFilesystem the image's baked .next is not writable, so we seed a writable
      # emptyDir with the built .next and mount it over /app/.next. The root FS stays read-only.
      initContainers:
        - name: seed-next
          image: harbor.registry.notypie.dev/dev/blog_fe:latest
          imagePullPolicy: Always
          command: ["sh", "-c", "cp -a /app/.next/. /next-rw/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: next-rw
              mountPath: /next-rw
      containers:
        - name: fe
          # Build with NEXT_PUBLIC_* build args — see configmap.yaml for instructions.
          image: harbor.registry.notypie.dev/dev/blog_fe:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: blog-fe-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Writable .next (seeded from the image by the initContainer). Covers both the
            # prerender output (.next/server/app/*.html) and the incremental cache (.next/cache).
            - name: next-rw
              mountPath: /app/.next
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-rw
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: blog-fe
