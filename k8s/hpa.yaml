apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blog-fe
  namespace: blog
  labels:
    app.kubernetes.io/name: blog-fe
    app.kubernetes.io/part-of: blog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blog-fe
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
